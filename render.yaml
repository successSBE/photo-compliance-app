services:
  - type: web
    name: photo-compliance-app
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
      - key: APP_USER_1_EMAIL
        value: success@elevatesbe.com
      - key: APP_USER_1_PASSWORD
        sync: false
      - key: APP_USER_2_EMAIL
        value: paul.neal1990@gmail.com
      - key: APP_USER_2_PASSWORD
        sync: false

